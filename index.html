<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bount Replica - Space Mono Hover</title>
    <meta name="theme-color" content="#111111">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #ff0033;
        }

        html,
        body {
            background-color: #111;
            /* Color oscuro para el rebote/overscroll superior en Mac */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 17px 20px;
            /* Slim header */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box;
            background-color: transparent;
            transition: background-color 0.4s ease;
        }

        body.scrolled header,
        header:hover {
            background-color: var(--bg-color);
        }

        .logo {
            flex: 1;
            display: flex;
            justify-content: flex-start;
        }

        .logo img {
            height: 20px;
            filter: invert(1);
            transform: translateY(2px);
            /* Ajuste optico hacia abajo */
            transition: filter 0.4s ease;
        }

        body.scrolled .logo img,
        header:hover .logo img {
            filter: invert(0);
        }

        nav {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
            /* Medium */
            text-transform: uppercase;
            letter-spacing: -0.04em;
            transition: color 0.4s ease;
        }

        nav a:hover {
            color: #ddd;
        }

        nav a.active {
            color: white;
        }

        body.scrolled nav a,
        header:hover nav a {
            color: #888;
        }

        body.scrolled nav a:hover,
        header:hover nav a:hover {
            color: #000;
        }

        body.scrolled nav a.active,
        header:hover nav a.active {
            color: var(--accent-color);
        }

        .header-socials {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
        }

        .header-socials img {
            width: 24px;
            height: auto;
            cursor: pointer;
            filter: invert(1);
            transition: filter 0.4s ease, opacity 0.2s;
        }

        body.scrolled .header-socials img,
        header:hover .header-socials img {
            filter: invert(0);
        }

        .header-socials a:hover img {
            opacity: 0.6;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 85vh;
            background-color: #111;
        }

        .hero-title {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .hero-title img {
            width: 230px;
            max-width: 80vw;
            height: auto;
            object-fit: contain;
            object-position: left;
            filter: brightness(0) invert(1);
            /* Forzar color blanco puro */
        }

        .container {
            padding: 40px 20px 0px 20px;
            background-color: var(--bg-color);
            /* Mantener fondo blanco para el contenido */
            min-height: 100vh;
            padding-bottom: 100px;
        }

        h1 {
            font-size: 64px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 40px;
            letter-spacing: -0.05em;
            line-height: 0.9;
        }

        h1 span {
            color: var(--accent-color);
        }

        .grid-content {
            display: flex;
            gap: 10px;
            width: 100%;
            align-items: flex-start;
        }

        .box {
            background-color: #000;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .box-wide {
            flex: 256;
            aspect-ratio: 16 / 9;
        }

        .box-tall {
            flex: 81;
            aspect-ratio: 9 / 16;
        }

        .box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.4s ease;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .overlay span {
            font-family: 'Space Mono', monospace;
            color: white;
            font-size: 10pt;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            text-align: center;
        }

        .box-tall:hover img {
            filter: brightness(0.4);
        }

        .box-tall:hover .overlay {
            opacity: 1;
        }

        @font-face {
            font-family: 'Awesome';
            src: url('Awesome.ttf') format('truetype'),
                url('Awesome.otf') format('opentype'),
                url('Awesome.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        .projects-grid {
            display: flex;
            gap: 20px;
            /* Un poco menos de espacio entre cuadros */
            align-items: flex-start;
            margin-top: 35px;
            margin-bottom: 80px;
            padding: 0 50px;
            /* Empuja los cuadros hacia adentro desde los bordes */
        }

        .project-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 60px;
            /* Espacio vertical entre los proyectos en una columna */
        }

        .project-item {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .project-img {
            background-color: #000;
            width: 100%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .project-img img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.4s ease;
        }

        .project-img:hover img {
            filter: brightness(0.6);
        }


        .project-img.box-tall {
            aspect-ratio: 4 / 5;
        }

        .project-img.box-medium {
            aspect-ratio: 10 / 9;
        }

        .project-img.box-wide {
            aspect-ratio: 14 / 9;
        }

        .project-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 15px;
            width: 100%;
        }

        .project-info h3 {
            font-family: 'Inter', sans-serif;
            font-size: 30pt;
            font-weight: 900;
            color: var(--text-color);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -0.04em;
        }

        .project-info .year {
            font-family: 'Inter', sans-serif;
            font-size: 11pt;
            font-weight: 400;
            letter-spacing: -0.04em;
            /* Peso bajo */
            color: var(--text-color);
        }

        .site-footer {
            background-color: #111;
            width: 100%;
            padding: 70px 50px 40px 50px;
            box-sizing: border-box;
        }

        .footer-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 40px;
            padding-bottom: 50px;
            border-bottom: 1px solid #333;
        }

        .footer-logo img {
            height: 22px;
            width: auto;
            filter: invert(1);
        }

        .footer-columns {
            display: flex;
            gap: 80px;
        }

        .footer-col h4 {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #555;
            margin: 0 0 16px 0;
        }

        .footer-col ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .footer-col ul li a {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #aaa;
            text-decoration: none;
            letter-spacing: -0.02em;
            transition: color 0.2s;
        }

        .footer-col ul li a:hover {
            color: #fff;
        }

        .footer-col p {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: #aaa;
            margin: 0;
            line-height: 1.7;
            letter-spacing: -0.02em;
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 24px;
        }

        .footer-bottom span {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 400;
            color: #444;
            letter-spacing: -0.01em;
        }
        .img-mobile { display: none; }
        .img-desktop { display: block; }

        /* ── MOBILE ── */
        @media (max-width: 768px) {

            .img-mobile { display: block; }
            .img-desktop { display: none; }

            /* Header */
            header {
                padding: 14px 16px;
            }

            nav {
                display: none;
            }

            .header-socials {
                gap: 14px;
            }

            .header-socials img {
                width: 20px;
            }

            .logo img {
                height: 16px;
            }

            /* Hero */
            .hero {
                height: 100vh;
            }

            .hero-title {
                left: 50%;
                bottom: 60px;
                transform: translateX(-50%);
                align-items: center;
            }

            .hero-title img {
                width: 160px;
            }

            /* Grid */
            .projects-grid {
                flex-direction: column;
                padding: 0;
                gap: 30px;
                margin-bottom: 40px;
            }

            .project-column {
                gap: 30px;
                width: 100%;
            }

            .project-item {
                width: 100%;
                padding: 0 16px;
                box-sizing: border-box;
            }

            .project-info {
                box-sizing: border-box;
                width: 100%;
            }

            .project-img.box-tall,
            .project-img.box-medium,
            .project-img.box-wide {
                aspect-ratio: 16 / 9;
            }

            .project-img img.img-mobile {
                transform: scale(1.80);
                transform-origin: center 30%;
            }

            .project-info h3 {
                font-size: 20pt;
            }

            .container {
                padding: 10px 0 60px 0 !important;
            }

            .projects-grid {
                margin-top: 10px;
            }

            /* Footer */
            .site-footer {
                padding: 40px 20px 30px 20px;
            }

            .footer-top {
                flex-direction: column;
                gap: 32px;
            }

            .footer-columns {
                flex-direction: column;
                gap: 28px;
            }

            .footer-bottom {
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="BOUNT">
        </div>
        <nav>
            <ul>
                <li><a href="portfolio.html" class="active">TRABAJO DESTACADO</a></li>

                    </div>

            </div>

            <!-- Columna 2 -->
            <div class="project-column">
                <div class="project-item">
                    <div class="project-img box-medium"></div>
                    <div class="project-info">
                        <h3>SOON...</h3>
                    </div>
                </div>
                <div class="project-item">
                    <div class="project-img box-wide"></div>
                    <div class="project-info">
                        <h3>SOON...</h3>
                    </div>
                </div>
            </div>

            <!-- Columna 3 -->
            <div class="project-column">
                <div class="project-item">
                    <div class="project-img box-wide"></div>
                    <div class="project-info">
                        <h3>SOON...</h3>
                    </div>
                </div>
                <div class="project-item">
                    <div class="project-img box-wide"></div>
                    <div class="project-info">
                        <h3>SOON...</h3>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-top">
            <div class="footer-logo">
                <img src="logo.png" alt="BOUNT">
            </div>
            <div class="footer-columns">
                <div class="footer-col">
                    <h4>Navegación</h4>
                    <ul>
                        <li><a href="#">Trabajo Destacado</a></li>

                <div class="footer-col">

            <span>© 2026 BOUNT. Todos los derechos reservados.</span>
            <span>Producción Audiovisual & Dirección de Video</span>
        </div>
    </footer>

    <script>
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                document.body.classList.add('scrolled');
            } else {
                document.body.classList.remove('scrolled');
            }
        });
    </script>
</body>

</html>
