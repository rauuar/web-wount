<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertigo Taxi — BOUNT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .video-wrap {
            width: calc(100% - 40px);
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            position: relative;
            cursor: pointer;
            margin-top: 0;
            margin-bottom: 28px;
            margin-bottom: 28px;
        }

        .video-wrap iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .poster {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 30%;
            display: block;
        }

        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
            opacity: 0.8;
        }

        .play-btn svg {
            width: 48px;
            height: 48px;
            fill: #fff;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
        }

        .video-wrap:hover .play-btn {
            transform: translate(-50%, -50%) scale(1.1);
            opacity: 1;
        }

        .back {
            margin-top: 0;
            text-decoration: none;
            color: #555;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: -0.08em;
            transition: color 0.2s;
        }

        .back:hover {
            color: #000;
        }
    </style>
</head>
<body>

    <div class="video-wrap" id="videoWrap">
        <img class="poster" src="vert-img.png" alt="Vertigo Taxi">
        <div class="play-btn">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
    </div>

    <a href="index.html" class="back">regresar</a>

    <script>
        document.getElementById('videoWrap').addEventListener('click', function() {
            this.innerHTML = '<iframe width="560" height="315" src="https://www.youtube.com/embed/MOhA_z-a5_Y?si=Zp85vG9Rl0hpKyeu&autoplay=1" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>';
            this.style.cursor = 'default';
        });
    </script>

</body>
</html>
